name: pages

# Builds and deploys the bpetite documentation site to GitHub Pages.
#
# Runtime is pure static HTML/CSS/JS. Markdown is rendered at build time
# by docs/site/build.py (markdown-it-py + Pygments). The script fails the
# build if any emitted HTML would violate the strict CSP shipped in the
# base template.
#
# All remote action references are SHA-pinned with a trailing `# vX.Y.Z`
# comment per the `validate CI control plane` gate in ci-meta.yml. Python
# and uv are provisioned via the local composite action
# `.github/actions/setup-python-env` so the pin for astral-sh/setup-uv
# lives in exactly one place across the repo.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# One in-flight deploy at a time; never cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Need full history so docs/site/build.py can read git log for
          # last-modified timestamps on each published document.
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-python-env

      - name: Install docs dependencies
        shell: bash
        run: uv sync --locked --group docs

      - name: Build site
        shell: bash
        run: uv run python docs/site/build.py --out _site

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: deploy to pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
