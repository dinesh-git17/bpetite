name: import-smoke

# Non-blocking. Confirms the installed package imports cleanly and the only
# public export is `Tokenizer` (FR-30). This is a trivial sanity check on
# top of the main tests matrix and is therefore not a merge blocker.
# Because it is non-blocking we are free to gate the trigger with top-level
# `paths` filters to save Actions minutes.

on:
  pull_request:
    paths:
      - "src/bpetite/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "src/bpetite/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: import-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  import-smoke:
    name: import bpetite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Guard pre-scaffold state
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f pyproject.toml ]]; then
            echo "pyproject.toml missing; skipping non-blocking import-smoke."
            echo "run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup environment
        if: steps.gate.outputs.run == 'true'
        uses: ./.github/actions/setup-python-env

      - name: Import and verify public surface
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import bpetite
          from bpetite import Tokenizer  # noqa: F401

          public = [name for name in dir(bpetite) if not name.startswith("_")]
          if "Tokenizer" not in public:
              raise SystemExit("Tokenizer is not exported from bpetite")
          leaked = set(public) - {"Tokenizer"}
          if leaked:
              raise SystemExit(f"unexpected public names in bpetite: {sorted(leaked)}")
          print("import-smoke ok")
          PY
