name: tests

# Required merge gate. Triggers on every PR and every push to main so a
# required status check is always reported. The "detect" step classifies
# changed files and subsequent steps only run when the change set is
# relevant. When not relevant, the job exits 0 with a no-op log line so the
# required check still reports success.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect relevant changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          globs: |
            src/bpetite/**
            tests/**
            pyproject.toml
            uv.lock

      - name: Compute gate
        id: gate
        shell: bash
        env:
          RELEVANT: ${{ steps.detect.outputs.relevant }}
        run: |
          set -euo pipefail
          if [[ "${RELEVANT}" != "true" ]]; then
            echo "reason=no-relevant-changes" >> "${GITHUB_OUTPUT}"
            echo "run=false" >> "${GITHUB_OUTPUT}"
          elif [[ ! -f pyproject.toml ]]; then
            echo "reason=pre-scaffold" >> "${GITHUB_OUTPUT}"
            echo "run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "reason=run" >> "${GITHUB_OUTPUT}"
            echo "run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: No-op
        if: steps.gate.outputs.run != 'true'
        shell: bash
        run: echo "tests.yml no-op (${{ steps.gate.outputs.reason }}); reporting success."

      - name: Setup environment
        if: steps.gate.outputs.run == 'true'
        uses: ./.github/actions/setup-python-env

      - name: Run pytest
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: uv run pytest
