name: build

# Required merge gate. Packaging smoke test: build wheel and sdist with
# `uv build`, then validate metadata with `uvx twine check`. The step
# guarantees that pyproject metadata, readme rendering and build-backend
# configuration never silently break.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: uv build + twine check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Detect relevant changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          globs: |
            src/bpetite/**
            pyproject.toml
            README.md

      - name: Compute gate
        id: gate
        shell: bash
        env:
          RELEVANT: ${{ steps.detect.outputs.relevant }}
        run: |
          set -euo pipefail
          if [[ "${RELEVANT}" != "true" ]]; then
            echo "reason=no-relevant-changes" >> "${GITHUB_OUTPUT}"
            echo "run=false" >> "${GITHUB_OUTPUT}"
          elif [[ ! -f pyproject.toml ]]; then
            echo "reason=pre-scaffold" >> "${GITHUB_OUTPUT}"
            echo "run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "reason=run" >> "${GITHUB_OUTPUT}"
            echo "run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: No-op
        if: steps.gate.outputs.run != 'true'
        shell: bash
        run: echo "build.yml no-op (${{ steps.gate.outputs.reason }}); reporting success."

      - name: Setup environment
        if: steps.gate.outputs.run == 'true'
        uses: ./.github/actions/setup-python-env

      - name: Build wheel and sdist
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: uv build

      - name: Validate distribution metadata
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: uvx twine check dist/*
